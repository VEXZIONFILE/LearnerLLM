# Self-hosted stack — no public internet port required.
# API is reachable on the home LAN and over Tailscale only (do not forward port 8080 on the router).
#
# Usage:
#   cp .env.example .env   # edit secrets
#   mkdir -p data secrets  # put firebase.json in secrets/
#   docker compose -f docker-compose.selfhost.yml up -d --build

services:
  api:
    build: .
    ports:
      # Binds on all local interfaces (LAN + Tailscale). Still private if the router has no port forwarding.
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./secrets:/app/secrets:ro
    environment:
      FIREBASE_CREDENTIALS_PATH: /app/secrets/firebase.json
    restart: unless-stopped
