# Fly.io config for LearnerLM API
# First deploy: cd backend && fly launch --no-deploy
# Then create volume: fly volumes create learnerlm_data --region <your-region> --size 1

app = "learnerlm-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_NAME = "LearnerLM API"
  DEBUG = "false"
  DATABASE_URL = "sqlite+aiosqlite:///./data/learnerlm.db"
  CORS_ORIGINS = "*"
  OPENROUTER_BASE_URL = "https://openrouter.ai/api/v1"
  OPENROUTER_REFERER = "https://github.com/VEXZIONFILE/LearnerLLM"
  OPENROUTER_TITLE = "LearnerLM"
  GOOGLE_PLAY_PACKAGE_NAME = "com.learnerlm"
  FIREBASE_AUTH_DISABLED = "false"
  BILLING_VERIFICATION_DISABLED = "false"
  FREE_DAILY_SCAN_LIMIT = "3"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "learnerlm_data"
  destination = "/app/data"
